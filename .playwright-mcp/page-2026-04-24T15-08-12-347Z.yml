      - paragraph [ref=e130]: Доступність та функції Meta API можуть змінюватись відповідно до рішень Meta Platforms Inc. DEP Software не несе відповідальності за зміни в API, що впливають на роботу сервісу.
      - paragraph [ref=e131]:
        - text: Платформа підтримує інтеграцію з
        - strong [ref=e132]: KeyCRM
        - text: — CRM-системою з власною інтеграцією з Meta. При підключенні KeyCRM дані замовлень (товар, кількість, контакт, адреса) передаються безпосередньо до KeyCRM. Використання KeyCRM регулюється окремими умовами цього сервісу.
