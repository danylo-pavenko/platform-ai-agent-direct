      - list [ref=e68]:
        - listitem [ref=e69]: Контактна інформація (ім'я, email, назва компанії).
        - listitem [ref=e70]: Дані для інтеграції з Instagram (токени доступу до сторінок Meta/Instagram).
        - listitem [ref=e71]: Каталог товарів, системні промпти, база знань, які використовуються для навчання AI-агента.
        - listitem [ref=e72]: Платіжна інформація (обробляється зовнішнім платіжним провайдером).
      - paragraph [ref=e73]:
        - strong [ref=e74]: "Від кінцевих користувачів Instagram (через Meta Platform Webhooks):"
      - list [ref=e75]:
        - listitem [ref=e76]: Instagram User ID (IGSID) — унікальний ідентифікатор, наданий Meta.
        - listitem [ref=e77]: Вміст повідомлень (Direct Messages), надісланих на сторінку підприємця.
        - listitem [ref=e78]: Ім'я профілю та фото профілю Instagram (якщо доступне через Meta API).
        - listitem [ref=e79]: "Метадані повідомлень: час, статус прочитання."
      - paragraph [ref=e80]:
        - strong [ref=e81]: "Технічні дані:"
      - list [ref=e82]:
        - listitem [ref=e83]: Журнали запитів (IP-адреса, user-agent, час) — для безпеки та відлагодження.
        - listitem [ref=e84]: Інформація про Webhook-підписки Meta.
      - paragraph [ref=e86]:
        - strong [ref=e87]: "Важливо:"
        - text: Ми збираємо дані кінцевих користувачів Instagram виключно від імені клієнта-підприємця в рамках авторизованих дозволів Meta Platform. Ми виступаємо як обробник даних (Data Processor), а клієнт-підприємець — як Контролер даних (Data Controller).
    - separator [ref=e88]
    - generic [ref=e89]:
      - generic [ref=e90]: "03"
      - heading "Дозволи Instagram / Meta Platform" [level=2] [ref=e91]
      - paragraph [ref=e92]: "Для роботи платформи клієнти-підприємці надають нашому застосунку такі дозволи Meta Platform:"
      - list [ref=e93]:
        - listitem [ref=e94]:
          - generic [ref=e95]: instagram_manage_messages
          - paragraph [ref=e96]: Читання вхідних DM та надсилання відповідей від імені Instagram-сторінки клієнта. Це основний дозвіл для роботи AI-агента.
        - listitem [ref=e97]:
          - generic [ref=e98]: pages_messaging
          - paragraph [ref=e99]: Надсилання повідомлень через Messenger API для підключених Facebook-сторінок.
        - listitem [ref=e100]:
          - generic [ref=e101]: instagram_basic
          - paragraph [ref=e102]: Читання базової інформації про Instagram-акаунт підприємця (назва, ID, фото профілю) для відображення в адміністративній панелі.
        - listitem [ref=e103]:
          - generic [ref=e104]: pages_read_engagement
          - paragraph [ref=e105]: Читання базових показників взаємодії із сторінкою (необхідно для підтвердження підключення до Meta API).
        - listitem [ref=e106]:
          - generic [ref=e107]: pages_manage_metadata
          - paragraph [ref=e108]: Підписка та управління Webhook-подіями сторінки для отримання повідомлень в реальному часі.
      - paragraph [ref=e109]:
        - strong [ref=e110]: "Webhook-події, на які ми підписуємось:"
      - list [ref=e111]:
        - listitem [ref=e112]:
          - generic [ref=e113]: messages
          - text: — вхідні та вихідні DM-повідомлення
        - listitem [ref=e114]:
          - generic [ref=e115]: messaging_seen
          - text: — статус прочитання повідомлень
        - listitem [ref=e116]:
          - generic [ref=e117]: messaging_postbacks
          - text: — взаємодія з кнопками (postback)
      - paragraph [ref=e118]: Дані, отримані через ці дозволи, використовуються виключно для надання сервісу — автоматизованих AI-відповідей у Direct Messages. Вони не використовуються для реклами, не передаються третім сторонам без згоди підприємця та не зберігаються довше, ніж це необхідно для надання послуги.
    - separator [ref=e119]
    - generic [ref=e120]:
      - generic [ref=e121]: "04"
      - heading "Як ми використовуємо дані" [level=2] [ref=e122]
      - list [ref=e123]:
        - listitem [ref=e124]:
          - strong [ref=e125]: Генерація AI-відповідей.
          - text: Вміст повідомлень передається до AI-моделі (Claude від Anthropic) разом із промптом та базою знань клієнта-підприємця для генерації релевантної відповіді.
        - listitem [ref=e126]:
          - strong [ref=e127]: Обробка замовлень.
          - text: Структуровані дані замовлень (товар, розмір, контакт, адреса) передаються до CRM-системи клієнта (KeyCRM) для подальшого опрацювання менеджером.
        - listitem [ref=e128]:
          - strong [ref=e129]: Аналітика для підприємця.
          - text: Агреговані метрики (кількість діалогів, конверсія, час відповіді) відображаються в адміністративній панелі клієнта.
        - listitem [ref=e130]:
          - strong [ref=e131]: Безпека та підтримка.
          - text: Журнали використовуються для виявлення зловживань та відлагодження технічних проблем.
      - paragraph [ref=e132]:
        - text: Ми
        - strong [ref=e133]: не
        - text: використовуємо дані для таргетованої реклами, не передаємо їх для маркетингових цілей та не аналізуємо контент для будь-яких цілей, не пов'язаних із наданням сервісу.
    - separator [ref=e134]
    - generic [ref=e135]:
