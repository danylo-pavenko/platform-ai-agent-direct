      - heading "Про нас та сферу дії" [level=2] [ref=e50]
      - paragraph [ref=e51]:
        - text: Direct AI Agents — продукт компанії
        - strong [ref=e52]: DEP Software
        - text: (далі — «ми», «нас», «наша компанія»). Платформа надає послуги AI-агентів для автоматизованого спілкування з клієнтами через Instagram Direct Messages (DM), на основі промптів та джерел даних самих клієнтів-підприємців.
      - paragraph [ref=e53]: "Ця Політика конфіденційності поширюється на:"
      - list [ref=e54]:
        - listitem [ref=e55]: клієнтів-підприємців (магазини, бренди, агенції), що використовують платформу Direct AI Agents;
        - listitem [ref=e56]: кінцевих користувачів Instagram, які спілкуються з AI-агентом у Direct Messages;
        - listitem [ref=e57]:
          - text: відвідувачів вебсайту
          - link "direct-ai-agents.com" [ref=e58] [cursor=pointer]:
            - /url: https://direct-ai-agents.com
          - text: .
      - paragraph [ref=e59]:
        - text: Платформа інтегрована з Meta Platform (Facebook / Instagram), що регулюється також
        - link "Політикою конфіденційності Meta" [ref=e60] [cursor=pointer]:
          - /url: https://www.facebook.com/privacy/policy/
        - text: та
        - link "Політикою платформи Meta для розробників" [ref=e61] [cursor=pointer]:
