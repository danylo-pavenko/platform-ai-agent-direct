      - paragraph [ref=e186]: Наш вебсайт використовує лише технічно необхідні cookie (сесія, налаштування мови). Ми не використовуємо cookie для реклами або відстеження третіми сторонами.
      - paragraph [ref=e187]: Адміністративна панель (admin) використовує localStorage для зберігання токену сесії. Ці дані не передаються третім сторонам.
