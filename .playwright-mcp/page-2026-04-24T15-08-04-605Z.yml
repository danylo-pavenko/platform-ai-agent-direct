        - listitem [ref=e177]:
          - strong [ref=e178]: Право на переносимість
          - text: — отримати ваші дані у машиночитаному форматі (CSV/JSON).
      - paragraph [ref=e179]:
        - text: Для реалізації прав надішліть запит на
        - link "help@depsoftware.com" [ref=e180] [cursor=pointer]:
