      - heading "Передача даних третім сторонам" [level=2] [ref=e137]
      - paragraph [ref=e138]: "Ми співпрацюємо з такими сторонніми постачальниками послуг:"
      - list [ref=e139]:
        - listitem [ref=e140]:
          - strong [ref=e141]: Anthropic (Claude AI)
          - text: — постачальник AI-моделі для генерації відповідей. Вміст повідомлень передається до Anthropic API для обробки. Anthropic має власну
          - link "Політику конфіденційності" [ref=e142] [cursor=pointer]:
            - /url: https://www.anthropic.com/privacy
          - text: .
        - listitem [ref=e143]:
          - strong [ref=e144]: KeyCRM
          - text: — CRM-система, яку використовують наші клієнти-підприємці. KeyCRM має власну інтеграцію з Meta Platform і є незалежним обробником даних. Дані замовлень передаються до KeyCRM відповідно до налаштувань клієнта. Дивіться
          - link "Політику конфіденційності KeyCRM" [ref=e145] [cursor=pointer]:
            - /url: https://keycrm.app/privacy/
          - text: .
        - listitem [ref=e146]: Хмарний провайдер (EU) — сервери для зберігання даних у зоні eu-central-1.
      - paragraph [ref=e147]: Ми не продаємо, не обмінюємо та не передаємо персональні дані комерційним третім сторонам. Передача відбувається лише в обсязі, необхідному для надання сервісу, та на підставі укладених угод про обробку даних (DPA).
    - separator [ref=e148]
    - generic [ref=e149]:
