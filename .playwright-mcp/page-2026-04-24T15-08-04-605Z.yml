    - paragraph [ref=e46]:
      - strong [ref=e47]: "Коротко:"
      - text: Direct AI Agents — це платформа, яка дозволяє підприємцям підключати AI-агента до своїх сторінок в Instagram для автоматизованого спілкування з клієнтами у Direct Messages. Ми обробляємо повідомлення від імені наших клієнтів-підприємців, відповідно до дозволів Meta Platform. Ми не продаємо ваші дані.
    - generic [ref=e48]:
