      - heading "Зберігання та безпека" [level=2] [ref=e151]
      - list [ref=e152]:
        - listitem [ref=e153]:
          - strong [ref=e154]: "Розташування:"
          - text: Усі дані зберігаються на серверах у Євросоюзі (eu-central-1). Кожен клієнт-підприємець отримує ізольований інстанс із власною базою даних.
        - listitem [ref=e155]:
          - strong [ref=e156]: "Шифрування:"
          - text: Передача даних захищена TLS 1.3. Паролі та токени зберігаються у хешованому вигляді.
        - listitem [ref=e157]:
          - strong [ref=e158]: "Термін зберігання:"
          - text: Дані повідомлень зберігаються максимум 90 днів або відповідно до налаштувань клієнта-підприємця. Токени доступу Meta анульовуються при відключенні інтеграції.
        - listitem [ref=e159]:
          - strong [ref=e160]: "Видалення:"
          - text: Після розірвання договору з клієнтом-підприємцем усі дані видаляються протягом 30 днів.
        - listitem [ref=e161]:
          - strong [ref=e162]: "Доступ:"
          - text: До даних мають доступ лише уповноважені співробітники в рамках виконання своїх обов'язків.
