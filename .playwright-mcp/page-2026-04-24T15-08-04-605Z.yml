        - text: . Ми відповімо протягом 30 днів.
      - paragraph [ref=e181]: Якщо ви є кінцевим користувачем Instagram, ви також можете керувати своїми даними через налаштування Facebook/Instagram або звернутися до Meta безпосередньо.
    - separator [ref=e182]
