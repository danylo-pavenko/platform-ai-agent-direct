# Status Blessed AI Agent — Nginx config
# Place in /etc/nginx/sites-available/sb-agent.conf
# Then: ln -s /etc/nginx/sites-available/sb-agent.conf /etc/nginx/sites-enabled/
#
# TLS certificates are managed by Certbot (see infra/scripts/provision.sh)

# ── Admin SPA (Vue) ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name agent.status-blessed.com;

    ssl_certificate     /etc/letsencrypt/live/agent.status-blessed.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agent.status-blessed.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /home/blessed/platform-ai-agent-direct/apps/admin/dist;
    index index.html;

    # SPA fallback — all routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets for 1 year
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}

# ── Backend API + IG webhook ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.status-blessed.com;

    ssl_certificate     /etc/letsencrypt/live/api.status-blessed.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.status-blessed.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for future use)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ── HTTP → HTTPS redirect ──
server {
    listen 80;
    listen [::]:80;
    server_name agent.status-blessed.com api.status-blessed.com;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
