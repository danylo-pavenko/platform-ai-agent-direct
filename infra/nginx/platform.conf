# ═══════════════════════════════════════════════════════════════════
# Platform NGINX config — direct-ai-agents.com
#
# Covers:
#   direct-ai-agents.com + www    → Static landing page
#   admin.direct-ai-agents.com    → Super Admin dashboard (ports 4000/4001)
#
# Place at: /etc/nginx/sites-available/platform.conf
# Enable:   ln -s /etc/nginx/sites-available/platform.conf /etc/nginx/sites-enabled/
#
# TLS certs managed by Certbot (run provision-platform.sh to set up).
# ═══════════════════════════════════════════════════════════════════

# ── Landing: direct-ai-agents.com ──────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name direct-ai-agents.com www.direct-ai-agents.com;

    ssl_certificate     /etc/letsencrypt/live/direct-ai-agents.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/direct-ai-agents.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/direct-ai-agents.com;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy no-referrer-when-downgrade;
}

# www → non-www redirect (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.direct-ai-agents.com;

    ssl_certificate     /etc/letsencrypt/live/direct-ai-agents.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/direct-ai-agents.com/privkey.pem;

    return 301 https://direct-ai-agents.com$request_uri;
}

# ── Super Admin: admin.direct-ai-agents.com ────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.direct-ai-agents.com;

    ssl_certificate     /etc/letsencrypt/live/admin.direct-ai-agents.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.direct-ai-agents.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Security: block public access (optional — uncomment to restrict by IP)
    # allow 1.2.3.4;   # your IP
    # deny all;

    # Vue SPA (Super Admin frontend)
    location / {
        proxy_pass         http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Fastify API
    location /api/ {
        proxy_pass         http://127.0.0.1:4000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}

# ── HTTP → HTTPS redirect (all domains) ───────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name direct-ai-agents.com www.direct-ai-agents.com admin.direct-ai-agents.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
