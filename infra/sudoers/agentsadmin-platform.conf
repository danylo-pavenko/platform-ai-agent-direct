# agentsadmin sudoers snippet (install once on the VPS as root)
#
# Super-admin PM2 (agentsadmin) runs:
#   sudo bash infra/scripts/provision-client.sh ...
#   sudo -u <tenant> bash .../deploy-client.sh
#
# Install:
#   sudo cp infra/sudoers/agentsadmin-platform.conf /etc/sudoers.d/agentsadmin-platform
#   sudo chmod 440 /etc/sudoers.d/agentsadmin-platform
#   sudo visudo -cf /etc/sudoers.d/agentsadmin-platform
#
# Linux tenant users do NOT get passwords — SSH public-key login only.
# No tenant Linux password is stored anywhere by design.

agentsadmin ALL=(root) NOPASSWD: /bin/bash
agentsadmin ALL=(ALL) NOPASSWD: /usr/bin/bash
